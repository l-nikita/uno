syntax = "proto3";
package proto;

message ChatMessage 
{
  string username = 1;
  string message = 2;
}

message Card 
{
  int32 type = 1;
  int32 color = 2;
  int32 value = 3;
}

message PlayerInfo 
{
  string name = 1;
  int32 card_count = 2;
}

message ServerGameState 
{
  int32 your_index = 1;
  int32 current_turn_index = 2;
  Card top_discard = 3;
  repeated Card my_hand = 4;
  repeated PlayerInfo opponents = 5;
}

message LobbyData {
  repeated string players = 1;
}

message NetMessage
{
  oneof payload 
  {
    ServerGameState game_state = 1;
    LobbyData lobby_data = 2;
    ChatMessage chat = 3;
  }
}
