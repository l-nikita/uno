syntax = "proto3";
package proto;

//-----------------------------------------------------------------------------
// From client to server
//-----------------------------------------------------------------------------
message ClientInfo 
{
  string name = 1;
}

message ChatMessage 
{
  string message = 1;
}

message PlayerAction {
  enum ActionType {
    DRAW_CARD = 0;
    PLAY_CARD = 1;
  }

  ActionType action = 1;
  int32 card_id = 2;
  int32 chosen_color = 3; 
}

//-----------------------------------------------------------------------------
// From server to client
//-----------------------------------------------------------------------------
message Card 
{
  int32 type = 1;
  int32 color = 2;
  int32 value = 3;
}

message PlayerInfo 
{
  int32 index = 1;
  string name = 2;
  bool is_host = 3;
  bool is_local = 4;
  repeated Card hand = 5;
  Card last_card = 6;
}

message ServerGameState 
{
  int32 stage = 1;
  int32 current_player = 2;
  bool reverse = 3;
  Card top_discard = 4;
  repeated PlayerInfo players = 5;
}

//-----------------------------------------------------------------------------
message NetMessage
{
  oneof payload 
  {
    ServerGameState game_state = 1;
    ClientInfo client_info = 2;
    ChatMessage chat = 3;
    PlayerAction player_action = 4;
  }
}
