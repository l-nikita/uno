syntax = "proto3";
package proto;

message ChatMessage 
{
  string username = 1;
  string message = 2;
}

message Card 
{
  int32 type = 1;
  int32 color = 2;
  int32 value = 3;
}

message PlayerInfo 
{
  int32 index = 1;
  string name = 2;
  bool is_host = 3;
  bool is_local = 4;
  repeated Card hand = 5;
}

message ServerGameState 
{
  int32 stage = 1;
  Card top_discard = 2;
  repeated PlayerInfo players = 3;
}

message NetMessage
{
  oneof payload 
  {
    ServerGameState game_state = 1;
    ChatMessage chat = 2;
  }
}
